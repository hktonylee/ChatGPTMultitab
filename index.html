<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Multitab</title>
    <link rel="icon" type="image/svg+xml" href="favicon-inverted.svg">
    <style>
      :root {
        color-scheme: light;
        --page: oklch(97% 0 0);
        --ink: oklch(22% 0 0);
        --muted: oklch(43% 0 0);
        --line: oklch(80% 0 0);
        --panel: oklch(99% 0 0);
        --focus: oklch(58% 0.17 225);
        --active: oklch(62% 0 0);
        --active-ink: oklch(22% 0 0);
        --active-line: oklch(58% 0 0);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family:
          Avenir Next,
          Avenir,
          Segoe UI,
          sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
        overflow: hidden;
      }

      .tabs {
        display: flex;
        align-items: end;
        gap: 0.1rem;
        min-height: 2rem;
        padding: 0.25rem 0.35rem 0;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
        background: var(--page);
      }

      .tab {
        min-width: 4.75rem;
        max-width: 150px;
        border: 1px solid var(--line);
        border-bottom: 0;
        border-radius: 6px 6px 0 0;
        padding: 0.28rem 0.65rem;
        background: color-mix(in oklch, var(--panel), var(--page) 42%);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition:
          background 160ms ease,
          border-color 160ms ease,
          color 160ms ease;
      }

      .tab:hover {
        background: var(--panel);
      }

      .tab:focus-visible,
      .add-tab:focus-visible {
        outline: 3px solid color-mix(in oklch, var(--focus), transparent 62%);
        outline-offset: 2px;
      }

      .tab[aria-selected="true"] {
        position: relative;
        z-index: 1;
        margin-bottom: -1px;
        padding-bottom: calc(0.28rem + 1px);
        border-color: var(--active-line);
        color: var(--active-ink);
        box-shadow:
          inset 0 3px 0 var(--active),
          0 1px 0 var(--panel);
      }

      .add-tab {
        width: 1.8rem;
        height: 1.55rem;
        border: 1px solid transparent;
        border-radius: 6px 6px 0 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
      }

      .toolbar-button {
        width: 1.8rem;
        height: 1.55rem;
        border: 1px solid transparent;
        border-radius: 6px 6px 0 0;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font: inherit;
        font-size: 1rem;
        line-height: 1;
      }

      .add-tab:hover {
        background: color-mix(in oklch, var(--panel), var(--page) 42%);
        color: var(--ink);
      }

      .toolbar-button:hover {
        background: color-mix(in oklch, var(--panel), var(--page) 42%);
        color: var(--ink);
      }

      main {
        min-height: 0;
        overflow: hidden;
      }

      .panel {
        display: none;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .panel.active {
        display: block;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--panel);
      }

      @media (max-width: 720px) {
        .tab {
          min-width: 4.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <nav class="tabs" aria-label="ChatGPT iframe tabs" role="tablist">
        <button class="tab" id="tab-chat-1" role="tab" aria-selected="true" aria-controls="panel-chat-1" type="button">
          Chat 1
        </button>
        <button class="add-tab" type="button" aria-label="New chat tab">+</button>
        <button class="toolbar-button open-tab" type="button" aria-label="Open active chat in new browser tab" title="Open active chat in new browser tab">&#8599;</button>
      </nav>

      <main>
        <section class="panel active" id="panel-chat-1" role="tabpanel" aria-labelledby="tab-chat-1">
          <iframe frameborder="0" src="https://chatgpt.com" allow="camera; clipboard-write; fullscreen; microphone; geolocation" title="ChatGPT home"></iframe>
        </section>
      </main>
    </div>

    <script>
      (function attachSessionState(root) {
        const DEFAULT_CHAT_URL = 'https://chatgpt.com/';
        const DEFAULT_CHAT_TITLE = 'ChatGPT';
        const CHATGPT_HOSTNAME = 'chatgpt.com';

        function createTabState(id, title = DEFAULT_CHAT_TITLE, url = DEFAULT_CHAT_URL) {
          const numericId = Number(id);
          const normalizedTitle = String(title || '').trim() || DEFAULT_CHAT_TITLE;

          return {
            id: numericId,
            title: normalizedTitle,
            url: normalizeTabUrl(url),
          };
        }

        function buildInitialTabState() {
          return {
            activeTabId: 1,
            tabs: [createTabState(1)],
          };
        }

        function normalizeTabUrl(url) {
          try {
            const rawUrl = String(url || '').trim();

            if (!/^https:\/\//i.test(rawUrl)) {
              return DEFAULT_CHAT_URL;
            }

            const normalizedUrl = new URL(rawUrl);

            if (normalizedUrl.protocol !== 'https:' || normalizedUrl.hostname !== CHATGPT_HOSTNAME) {
              return DEFAULT_CHAT_URL;
            }

            return normalizedUrl.href;
          } catch (_error) {
            return DEFAULT_CHAT_URL;
          }
        }

        function sanitizeStoredTabState(storedState) {
          const rawTabs = Array.isArray(storedState?.tabs) ? storedState.tabs : [];
          const tabs = rawTabs
            .map((tab) => {
              const id = Number(tab?.id);

              if (!Number.isInteger(id) || id < 1) {
                return null;
              }

              return createTabState(id, tab?.title, tab?.url);
            })
            .filter(Boolean);

          if (tabs.length === 0) {
            return buildInitialTabState();
          }

          const activeTabId = tabs.some((tab) => tab.id === storedState?.activeTabId)
            ? Number(storedState.activeTabId)
            : tabs[0].id;

          return {
            activeTabId,
            tabs,
          };
        }

        root.SessionState = {
          DEFAULT_CHAT_URL,
          DEFAULT_CHAT_TITLE,
          buildInitialTabState,
          createTabState,
          normalizeTabUrl,
          sanitizeStoredTabState,
        };
      })(window);

      const SESSION_STORAGE_KEY = 'chatgpt-multitab-session';
      const tabList = document.querySelector('[role="tablist"]');
      const addTabButton = document.querySelector('.add-tab');
      const main = document.querySelector('main');
      let nextTabId = 2;

      function getTabs() {
        return [...document.querySelectorAll('[role="tab"]')];
      }

      function getPanels() {
        return [...document.querySelectorAll('[role="tabpanel"]')];
      }

      function getActivePanel() {
        return getPanels().find((panel) => !panel.hidden);
      }

      function getActiveFrameUrl() {
        const activePanel = getActivePanel();
        const iframe = activePanel?.querySelector('iframe');
        return iframe?.dataset.reportedChatUrl || iframe?.dataset.currentUrl || iframe?.src || '';
      }

      function openActiveFrameInBrowserTab() {
        const url = getActiveFrameUrl();

        if (!url) {
          return;
        }

        window.open(url, '_blank', 'noopener');
      }

      function getTabId(tab) {
        return Number(tab?.dataset.chatId || tab?.id.replace('tab-chat-', ''));
      }

      function getPanelForTab(tab) {
        return document.getElementById(tab.getAttribute('aria-controls'));
      }

      function getTabForPanel(panel) {
        return panel ? document.getElementById(panel.getAttribute('aria-labelledby')) : null;
      }

      function createChatIframe(url, title) {
        const iframe = document.createElement('iframe');
        iframe.frameBorder = '0';
        iframe.src = url;
        iframe.dataset.currentUrl = url;
        iframe.dataset.reportedChatUrl = url;
        iframe.allow = 'camera; clipboard-write; fullscreen; microphone; geolocation';
        iframe.title = title;
        return iframe;
      }

      function persistSession() {
        const tabs = getTabs().map((tab) => {
          const panel = getPanelForTab(tab);
          const iframe = panel?.querySelector('iframe');

          return {
            id: getTabId(tab),
            title: tab.textContent.trim(),
            url:
              iframe?.dataset.reportedChatUrl ||
              iframe?.dataset.currentUrl ||
              iframe?.src ||
              SessionState.DEFAULT_CHAT_URL,
          };
        });

        const activeTab = getTabs().find((tab) => tab.getAttribute('aria-selected') === 'true');
        const session = {
          activeTabId: activeTab ? getTabId(activeTab) : tabs[0]?.id || 1,
          tabs,
        };

        localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(session));
      }

      function createChatTab(tabState) {
        const tab = document.createElement('button');
        tab.className = 'tab';
        tab.id = `tab-chat-${tabState.id}`;
        tab.type = 'button';
        tab.dataset.chatId = String(tabState.id);
        tab.setAttribute('role', 'tab');
        tab.setAttribute('aria-selected', 'false');
        tab.setAttribute('aria-controls', `panel-chat-${tabState.id}`);
        tab.textContent = tabState.title;

        const panel = document.createElement('section');
        panel.className = 'panel';
        panel.id = `panel-chat-${tabState.id}`;
        panel.setAttribute('role', 'tabpanel');
        panel.hidden = true;
        panel.setAttribute('aria-labelledby', tab.id);
        panel.append(createChatIframe(tabState.url, tabState.title));

        tabList.insertBefore(tab, addTabButton);
        main.append(panel);

        return tab;
      }

      function restoreSession() {
        const stored = localStorage.getItem(SESSION_STORAGE_KEY);
        const parsed = stored ? JSON.parse(stored) : null;
        const session = SessionState.sanitizeStoredTabState(parsed);

        nextTabId =
          session.tabs.reduce((maxId, tabState) => Math.max(maxId, Number(tabState.id) || 0), 0) + 1;

        getTabs().forEach((tab) => tab.remove());
        getPanels().forEach((panel) => panel.remove());

        const restoredTabs = session.tabs.map((tabState) => createChatTab(tabState));
        const activeTab =
          restoredTabs.find((tab) => getTabId(tab) === session.activeTabId) || restoredTabs[0];

        if (activeTab) {
          activateTab(activeTab);
        }

        persistSession();
      }

      function activateTab(tab) {
        const tabs = getTabs();
        const panels = getPanels();

        tabs.forEach((item) => {
          item.setAttribute('aria-selected', String(item === tab));
          item.tabIndex = item === tab ? 0 : -1;
        });

        panels.forEach((panel) => {
          const isActive = panel.id === tab.getAttribute('aria-controls');
          panel.classList.toggle('active', isActive);
          panel.hidden = !isActive;
        });

        tab.focus();
        persistSession();
      }

      function addChatTab(url = SessionState.DEFAULT_CHAT_URL) {
        const chatId = nextTabId;
        nextTabId += 1;
        const tab = createChatTab(
          SessionState.createTabState(chatId, SessionState.DEFAULT_CHAT_TITLE, url),
        );
        activateTab(tab);
      }

      function closeTab(tab) {
        const tabs = getTabs();

        if (tabs.length <= 1) {
          return;
        }

        const tabIndex = tabs.indexOf(tab);
        const wasActive = tab.getAttribute('aria-selected') === 'true';
        const panel = document.getElementById(tab.getAttribute('aria-controls'));
        const nextTab = tabs[tabIndex + 1] || tabs[tabIndex - 1];

        tab.remove();
        panel?.remove();

        if (wasActive && nextTab) {
          activateTab(nextTab);
          return;
        }

        persistSession();
      }

      function updatePanelUrlFromMessage(sourceWindow, url) {
        if (!url) {
          return;
        }

        const matchingPanel = getPanels().find((panel) => {
          const iframe = panel.querySelector('iframe');
          return iframe && iframe.contentWindow === sourceWindow;
        });

        const matchingIframe = matchingPanel?.querySelector('iframe');

        if (!matchingIframe) {
          return;
        }

        matchingIframe.dataset.reportedChatUrl = SessionState.normalizeTabUrl(url);
        return { iframe: matchingIframe, panel: matchingPanel };
      }

      function updateTabTitleFromMessage(panel, title) {
        const nextTitle = String(title || '').trim();

        if (!panel || !nextTitle) {
          return;
        }

        const tab = getTabForPanel(panel);

        if (!tab) {
          return;
        }

        tab.textContent = nextTitle;
        const iframe = panel.querySelector('iframe');

        if (iframe) {
          iframe.title = nextTitle;
        }
      }

      function handleFrameReport(sourceWindow, url, title) {
        const result = updatePanelUrlFromMessage(sourceWindow, url);

        if (!result) {
          return;
        }

        updateTabTitleFromMessage(result.panel, title);
        persistSession();
      }

      tabList.addEventListener('click', (event) => {
        const tab = event.target.closest('[role="tab"]');

        if (tab) {
          activateTab(tab);
          return;
        }

        if (event.target.closest('.add-tab')) {
          addChatTab();
          return;
        }

        if (event.target.closest('.open-tab')) {
          openActiveFrameInBrowserTab();
        }
      });

      tabList.addEventListener('dblclick', (event) => {
        const tab = event.target.closest('[role="tab"]');

        if (!tab) {
          return;
        }

        closeTab(tab);
      });

      tabList.addEventListener('keydown', (event) => {
        const tab = event.target.closest('[role="tab"]');

        if (!tab) {
          return;
        }

        const tabs = getTabs();
        const index = tabs.indexOf(tab);
        const direction = event.key === 'ArrowRight' ? 1 : event.key === 'ArrowLeft' ? -1 : 0;

        if (!direction) {
          return;
        }

        event.preventDefault();
        activateTab(tabs[(index + direction + tabs.length) % tabs.length]);
      });

      window.addEventListener('message', (event) => {
        if (event.data?.source !== 'chatgpt-multitab' || event.data?.type !== 'chatgpt-location') {
          return;
        }

        handleFrameReport(event.source, event.data.url, event.data.title);
      });

      restoreSession();
    </script>
  </body>
</html>
