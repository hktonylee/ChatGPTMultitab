<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT Multitab</title>
    <link rel="stylesheet" href="renderer.css">
  </head>
  <body>
    <nav class="tab-strip" aria-label="ChatGPT tabs" role="tablist">
      <div class="tab-cluster">
        <div class="tab-list"></div>
      </div>
      <div class="tab-actions">
        <button class="toolbar-button new-tab" type="button" aria-label="New chat tab" title="New chat tab">+</button>
        <button class="toolbar-button restore-tab" type="button" aria-label="Reopen closed tab" title="Reopen closed tab" disabled>↺</button>
        <button class="toolbar-button open-external" type="button" aria-label="Open active chat in browser" title="Open active chat in browser">↗</button>
      </div>
    </nav>
    <script src="renderer.js"></script>
  </body>
</html>
